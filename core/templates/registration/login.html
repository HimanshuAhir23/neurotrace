<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NeuroTrace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top right, #0a1128, #000000);
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    
    .blob {
        position: absolute;
        filter: blur(80px);
        z-index: 0;
        opacity: 0.6;
    }
    .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #0052cc; border-radius: 50%; }
    .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #6554c0; border-radius: 50%; }

    .auth-container {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }
    .logo-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #0065ff, #00c7e6);
        border-radius: 12px;
        font-weight: 800;
        font-size: 18px;
        color: #fff;
        margin-bottom: 12px;
    }
    h2 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    p.subtitle { color: #8b949e; text-align: center; font-size: 14px; margin-bottom: 24px; }

    form { display: flex; flex-direction: column; gap: 16px; }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .input-group label {
        font-size: 13px;
        font-weight: 500;
        color: #c9d1d9;
    }

    .input-group input {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 12px 16px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
    }

    .input-group input:focus {
        border-color: #0052cc;
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.3);
    }

    .btn {
        background: linear-gradient(135deg, #0065ff, #0052cc);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.2s;
        margin-top: 8px;
    }

    .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(0, 82, 204, 0.4);
    }

    .btn:active {
        transform: translateY(1px);
    }

    .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 13px;
        color: #8b949e;
    }
    
    .footer a {
        color: #00c7e6;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }

    .footer a:hover { color: #fff; }

    .error-msg {
        background: rgba(222, 53, 11, 0.1);
        border: 1px solid rgba(222, 53, 11, 0.3);
        color: #ff8f73;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        text-align: center;
    }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="auth-container">
    <div class="logo">
        <div class="logo-icon">NT</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to view your activity dashboard.</p>
    </div>

    {% if form.errors %}
        <div class="error-msg">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="input-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>
        <div class="input-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        <button type="submit" class="btn">Log In</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
    </div>
</div>

</body>
</html>

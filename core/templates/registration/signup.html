<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - NeuroTrace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top left, #120e2b, #000000);
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    
    .blob {
        position: absolute;
        filter: blur(80px);
        z-index: 0;
        opacity: 0.6;
    }
    .blob-1 { top: -10%; right: -10%; width: 400px; height: 400px; background: #6554c0; border-radius: 50%; }
    .blob-2 { bottom: -10%; left: -10%; width: 500px; height: 500px; background: #00b8d9; border-radius: 50%; }

    .auth-container {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }
    .logo-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #00c7e6, #6554c0);
        border-radius: 12px;
        font-weight: 800;
        font-size: 18px;
        color: #fff;
        margin-bottom: 12px;
    }
    h2 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    p.subtitle { color: #8b949e; text-align: center; font-size: 14px; margin-bottom: 24px; }

    form { display: flex; flex-direction: column; gap: 16px; }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .input-group label {
        font-size: 13px;
        font-weight: 500;
        color: #c9d1d9;
    }

    .input-group input {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 12px 16px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
    }

    .input-group input:focus {
        border-color: #6554c0;
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 0 3px rgba(101, 84, 192, 0.3);
    }

    .btn {
        background: linear-gradient(135deg, #6554c0, #0052cc);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.2s;
        margin-top: 8px;
    }

    .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(101, 84, 192, 0.4);
    }

    .btn:active {
        transform: translateY(1px);
    }

    .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 13px;
        color: #8b949e;
    }
    
    .footer a {
        color: #00c7e6;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }

    .footer a:hover { color: #fff; }

    .helptext {
        font-size: 11px;
        color: #6e7681;
        margin-top: 4px;
    }
    
    .errorlist {
        list-style: none;
        color: #ff8f73;
        font-size: 12px;
        margin-top: 4px;
        padding: 0;
    }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="auth-container">
    <div class="logo">
        <div class="logo-icon">NT</div>
        <h2>Create an Account</h2>
        <p class="subtitle">Start tracking your productivity.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="input-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <div class="helptext">{{ field.help_text|safe }}</div>
                {% endif %}
                {% if field.errors %}
                    {{ field.errors }}
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="footer">
        Already have an account? <a href="{% url 'login' %}">Log in here</a>
    </div>
</div>

<script>
    // Make django default inputs look nice
    document.querySelectorAll('input').forEach(input => {
        if(input.type !== 'submit') {
            input.className = ''; 
        }
    });
</script>
</body>
</html>
